<!DOCTYPE html>
<html>
<head>
    <title>Direct WebSocket Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .log {
            background-color: #f5f5f5;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 3px;
            height: 300px;
            overflow-y: auto;
            margin-bottom: 20px;
            font-family: monospace;
        }
        .log .error { color: red; }
        .log .success { color: green; }
        .log .info { color: blue; }
        .form-group {
            margin-bottom: 10px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        button {
            padding: 8px 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        button:disabled {
            background-color: #cccccc;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Direct WebSocket Test</h1>
        <p>This page tests raw WebSocket connection without STOMP protocol.</p>

        <div class="form-group">
            <label for="token">JWT Token:</label>
            <input type="text" id="token" value="eyJhbGciOiJIUzUxMiJ9.eyJzdWIiOiI4NiIsInJvbGVzIjpbIlVTRVIiLCJGUkFOQ0hJU0VFIl0sInNlc3Npb25JZCI6IjlkMzgyMjFiLTVlNmMtNGNlZC04MjVjLTVlODE5MmVjZWNiMyIsImlhdCI6MTc1MTQ0ODI4MCwiZXhwIjoxNzUyMDUzMDgwLCJpc3MiOiJOZWFycHJvcEJhY2tlbmQifQ.3iaOWImTDDLXbHvjaRF4BnjKLZU9xSdoLMVX8oTQb56kmjBaNTpABA5GRgejs3W66dQtj2kw6lsNcjRa9nwunA" size="50">
        </div>

        <div class="form-group">
            <label for="url">WebSocket URL:</label>
            <input type="text" id="url" value="ws://localhost:8080/api/ws">
        </div>

        <div class="form-group">
            <button id="connectBtn">Connect</button>
            <button id="disconnectBtn" disabled>Disconnect</button>
        </div>

        <h2>Connection Log:</h2>
        <div id="log" class="log"></div>

        <div class="form-group">
            <h3>Test API Connection:</h3>
            <button id="testApiBtn">Test API Endpoints</button>
            <div id="apiResults" style="margin-top: 10px;"></div>
        </div>
    </div>

    <script>
        const logElement = document.getElementById('log');
        const tokenInput = document.getElementById('token');
        const urlInput = document.getElementById('url');
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const testApiBtn = document.getElementById('testApiBtn');
        const apiResults = document.getElementById('apiResults');

        let socket = null;

        function log(message, type = 'info') {
            const entry = document.createElement('div');
            entry.className = type;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logElement.appendChild(entry);
            logElement.scrollTop = logElement.scrollHeight;
        }

        connectBtn.addEventListener('click', function() {
            const token = tokenInput.value.trim();
            const baseUrl = urlInput.value.trim();

            if (!token) {
                log('Please enter a JWT token', 'error');
                return;
            }

            // First test if the server is even running
            testApiEndpoint('/api/chat/rooms', token)
                .then(response => {
                    if (response.ok) {
                        log('API server is running. Proceeding with WebSocket connection...', 'success');
                        connectWebSocket(baseUrl, token);
                    } else {
                        log(`API server responded with status: ${response.status}. WebSocket connection may also fail.`, 'error');
                        connectWebSocket(baseUrl, token);
                    }
                })
                .catch(error => {
                    log(`Error reaching API server: ${error.message}. Server might be down.`, 'error');
                    connectWebSocket(baseUrl, token);
                });
        });

        disconnectBtn.addEventListener('click', function() {
            if (socket) {
                socket.close();
                connectBtn.disabled = false;
                disconnectBtn.disabled = true;
                log('WebSocket connection closed', 'info');
            }
        });

        testApiBtn.addEventListener('click', function() {
            const token = tokenInput.value.trim();
            apiResults.innerHTML = 'Testing API endpoints...';

            const endpoints = [
                '/api/properties',
                '/api/chat/rooms',
                '/api/status',
                '/api/chat-rooms'
            ];

            Promise.all(endpoints.map(endpoint => 
                testApiEndpoint(endpoint, token)
                .then(response => ({ 
                    endpoint,
                    status: response.status, 
                    ok: response.ok 
                }))
                .catch(error => ({ 
                    endpoint, 
                    error: error.message, 
                    ok: false 
                }))
            ))
            .then(results => {
                let html = '<ul>';
                results.forEach(result => {
                    const statusClass = result.ok ? 'success' : 'error';
                    const statusText = result.ok ? 'OK' : (result.error || `Error: ${result.status}`);
                    html += `<li class="${statusClass}">${result.endpoint}: ${statusText}</li>`;
                });
                html += '</ul>';
                apiResults.innerHTML = html;
            });
        });

        function testApiEndpoint(endpoint, token) {
            const baseUrl = urlInput.value.trim().replace('ws:', 'http:').split('/api/ws')[0];
            return fetch(`${baseUrl}${endpoint}`, {
                method: 'GET',
                headers: {
                    'Accept': 'application/json',
                    'Authorization': `Bearer ${token}`
                }
            });
        }

        function connectWebSocket(baseUrl, token) {
            try {
                // Construct proper URL with token
                const wsUrl = `${baseUrl}?token=${token}`;
                log(`Attempting to connect to: ${wsUrl}`, 'info');
                
                // Debug the URL being used
                log(`Using base URL: ${baseUrl}`, 'info');
                log(`With token: ${token.substring(0, 10)}...`, 'info');
                
                // Create WebSocket with explicit debug
                log('Creating WebSocket object...', 'info');
                socket = new WebSocket(wsUrl);
                log('WebSocket object created, waiting for connection...', 'info');

                socket.onopen = function() {
                    log('WebSocket connection established successfully!', 'success');
                    log('WebSocket raw connection successful. To communicate properly, you need to:', 'info');
                    log('1. Send a STOMP CONNECT frame', 'info');
                    log('2. Subscribe to relevant topics like /topic/chat/{roomId}', 'info');
                    log('3. Send messages to /app/chat/{roomId}/send destinations', 'info');
                    
                    connectBtn.disabled = true;
                    disconnectBtn.disabled = false;
                    
                    // If you want to establish a STOMP connection over the WebSocket:
                    const stompConnectFrame = 'CONNECT\n' +
                                              'accept-version:1.2\n' +
                                              'heart-beat:10000,10000\n\n\u0000';
                    
                    // Add a button to send STOMP connect frame
                    const stompConnectBtn = document.createElement('button');
                    stompConnectBtn.textContent = 'Send STOMP Connect Frame';
                    stompConnectBtn.onclick = function() {
                        socket.send(stompConnectFrame);
                        log('STOMP CONNECT frame sent. Waiting for CONNECTED response...', 'info');
                        
                        // Add a button to subscribe to chat room topic
                        const roomId = 1; // Default room ID
                        const subscribeBtn = document.createElement('button');
                        subscribeBtn.textContent = `Subscribe to Room #${roomId}`;
                        subscribeBtn.style.marginLeft = '10px';
                        subscribeBtn.onclick = function() {
                            const subscribeFrame = 'SUBSCRIBE\n' +
                                                 'id:sub-0\n' +
                                                 `destination:/topic/chat/${roomId}\n\n\u0000`;
                            socket.send(subscribeFrame);
                            log(`STOMP SUBSCRIBE frame sent for room #${roomId}`, 'info');
                            
                            // Add a button to send test message
                            const sendMessageBtn = document.createElement('button');
                            sendMessageBtn.textContent = 'Send Test Message';
                            sendMessageBtn.style.marginLeft = '10px';
                            sendMessageBtn.onclick = function() {
                                const messageFrame = 'SEND\n' +
                                                   `destination:/app/chat/${roomId}/send\n` +
                                                   'content-type:application/json\n\n' +
                                                   '{"content":"Hello from WebSocket Test Client!"}\u0000';
                                socket.send(messageFrame);
                                log('Test message sent to chat room', 'info');
                            };
                            document.querySelector('.form-group:nth-child(4)').appendChild(sendMessageBtn);
                        };
                        document.querySelector('.form-group:nth-child(4)').appendChild(subscribeBtn);
                    };
                    document.querySelector('.form-group:nth-child(4)').appendChild(stompConnectBtn);
                };

                socket.onclose = function(event) {
                    let reason;
                    switch(event.code) {
                        case 1000: reason = "Normal closure"; break;
                        case 1002: reason = "Protocol error"; break;
                        case 1003: reason = "Unsupported data"; break;
                        case 1005: reason = "No status received"; break;
                        case 1006: reason = "Abnormal closure"; break;
                        case 1007: reason = "Invalid frame payload data"; break;
                        case 1008: reason = "Policy violation"; break;
                        case 1009: reason = "Message too big"; break;
                        case 1010: reason = "Missing extension"; break;
                        case 1011: reason = "Internal error"; break;
                        case 1012: reason = "Service restart"; break;
                        case 1013: reason = "Try again later"; break;
                        case 1014: reason = "Bad gateway"; break;
                        case 1015: reason = "TLS handshake"; break;
                        default: reason = "Unknown"; break;
                    }
                    log(`WebSocket connection closed: ${event.code} - ${reason}`, 'error');
                    connectBtn.disabled = false;
                    disconnectBtn.disabled = true;

                    if (event.code === 1006) {
                        log('Connection dropped abnormally. Trying alternative connection methods...', 'info');
                        tryAlternativeConnections(baseUrl, token);
                    }
                };

                socket.onerror = function(error) {
                    log('WebSocket error occurred', 'error');
                };

                socket.onmessage = function(event) {
                    log(`Received raw message: ${event.data}`, 'success');
                    
                    // Try to parse as STOMP frame
                    try {
                        if (event.data.startsWith('CONNECTED')) {
                            log('STOMP connection established!', 'success');
                        } else if (event.data.startsWith('MESSAGE')) {
                            // Extract the body from the STOMP message
                            const bodyStart = event.data.indexOf('\n\n') + 2;
                            const bodyEnd = event.data.lastIndexOf('\u0000');
                            if (bodyStart > 0 && bodyEnd > bodyStart) {
                                const body = event.data.substring(bodyStart, bodyEnd);
                                try {
                                    const message = JSON.parse(body);
                                    log(`Received chat message: ${JSON.stringify(message)}`, 'success');
                                    // Display message in a more readable format
                                    displayMessage(message);
                                } catch (e) {
                                    log(`Received non-JSON message: ${body}`, 'info');
                                }
                            }
                        }
                    } catch (e) {
                        log(`Error parsing STOMP frame: ${e.message}`, 'error');
                    }
                };
            } catch (error) {
                log(`Error creating WebSocket: ${error.message}`, 'error');
            }
        }

        function tryAlternativeConnections(baseUrl, token) {
            const baseServer = baseUrl.split('/api/ws')[0];
            const alternatives = [
                `${baseServer}/api/ws?token=${token}`,
                `${baseServer}/ws?token=${token}`,
                `${baseServer}/socket?token=${token}`,
                `${baseServer}/websocket?token=${token}`,
                `${baseServer}/ws/websocket?token=${token}`
            ];

            let index = 0;
            
            function tryNext() {
                if (index >= alternatives.length) {
                    log('All alternative connections failed', 'error');
                    return;
                }

                const altUrl = alternatives[index];
                log(`Trying alternative connection: ${altUrl}`, 'info');
                
                const altSocket = new WebSocket(altUrl);
                
                altSocket.onopen = function() {
                    log(`Success with alternative URL: ${altUrl}`, 'success');
                    socket = altSocket;
                    connectBtn.disabled = true;
                    disconnectBtn.disabled = false;
                };
                
                altSocket.onclose = function(event) {
                    if (event.code !== 1000) {
                        log(`Alternative connection failed: ${altUrl} - code ${event.code}`, 'error');
                        index++;
                        setTimeout(tryNext, 1000);
                    }
                };
                
                altSocket.onerror = function() {
                    // Let the onclose handle errors
                };
            }
            
            tryNext();
        }

        // Function to display a message in a more readable format
        function displayMessage(message) {
            const messageDiv = document.createElement('div');
            messageDiv.style.padding = '10px';
            messageDiv.style.margin = '5px 0';
            messageDiv.style.backgroundColor = '#e8f5e9';
            messageDiv.style.borderRadius = '5px';
            
            // Create message content
            let content = '';
            
            if (message.sender) {
                const roleDisplay = message.sender.roles ? 
                    `<span style="color: #777; font-size: 0.8em;">(${message.sender.roles.join(', ')})</span>` : '';
                content += `<strong>${message.sender.name || 'Unknown'} ${roleDisplay}</strong>: `;
            }
            
            content += `${message.content}`;
            
            if (message.createdAt) {
                const date = new Date(message.createdAt);
                content += `<br><small>Sent at: ${date.toLocaleTimeString()}</small>`;
            }
            
            // Add message status if available
            if (message.status) {
                content += `<small style="margin-left: 10px; color: #777;"> · ${message.status}</small>`;
            }
            
            messageDiv.innerHTML = content;
            
            // Style differently based on message type
            if (message.adminMessage) {
                messageDiv.style.backgroundColor = '#ffebee';
                messageDiv.style.borderLeft = '4px solid #f44336';
            } else if (message.sender && message.sender.roles && message.sender.roles.includes('SELLER')) {
                messageDiv.style.backgroundColor = '#e3f2fd';
                messageDiv.style.borderLeft = '4px solid #2196F3';
            }
            
            // Add to log container
            logElement.appendChild(messageDiv);
            logElement.scrollTop = logElement.scrollHeight;
        }
    </script>
</body>
</html>
