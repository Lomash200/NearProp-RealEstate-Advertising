# Import secrets configuration
spring.profiles.include=secrets

# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/api
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
server.error.include-exception=false
spring.main.allow-bean-definition-overriding=true
spring.main.allow-circular-references=true

# ===== PERFORMANCE OPTIMIZATIONS =====

# HTTP Response Compression (reduces bandwidth and speeds up responses)
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,application/javascript
server.compression.min-response-size=1024
server.compression.excluded-user-agents=gozilla,traviata

# Tomcat Thread Pool Optimization (handles more concurrent requests)
server.tomcat.max-threads=200
server.tomcat.min-spare-threads=20
server.tomcat.max-connections=8192
server.tomcat.accept-count=100
server.tomcat.connection-timeout=20000

# Database Configuration
