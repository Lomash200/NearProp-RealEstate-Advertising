# ===== DATABASE CONNECTION POOL OPTIMIZATION =====
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.register-mbeans=true

# JPA/Hibernate Optimizations
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
# Hibernate cache disabled - using Spring cache abstraction instead
# spring.jpa.properties.hibernate.cache.use_second_level_cache=false
# spring.jpa.properties.hibernate.cache.use_query_cache=false
# spring.jpa.properties.hibernate.cache.region.factory_class=org.hibernate.cache.jcache.JCacheRegionFactory

# Disable default Spring Security user
spring.security.user.name=
spring.security.user.password=
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# ===== REDIS CONFIGURATION =====
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.database=0
spring.redis.timeout=2000ms
spring.redis.lettuce.pool.max-active=20
spring.redis.lettuce.pool.max-idle=10
spring.redis.lettuce.pool.min-idle=5
spring.redis.lettuce.pool.max-wait=1000ms

# ===== ADVANCED CACHING CONFIGURATION =====
# Primary cache (Caffeine) for local caching
spring.cache.type=caffeine
spring.cache.cache-names=properties,users,districts,subscriptions,chat-rooms,reviews,reels,visits,property-search,user-properties,advertisements,coupons
spring.cache.caffeine.spec=maximumSize=2000,expireAfterWrite=15m,expireAfterAccess=10m

# Cache TTL configurations for different data types
cache.properties.ttl=15m
cache.users.ttl=30m
cache.districts.ttl=60m
cache.chat-rooms.ttl=5m
cache.chat-messages.ttl=2m
cache.reels.ttl=10m
cache.visits.ttl=5m
cache.search-results.ttl=5m
cache.advertisements.ttl=10m
cache.coupons.ttl=30m

# ===== ASYNC PROCESSING CONFIGURATION =====
spring.task.execution.pool.core-size=10
spring.task.execution.pool.max-size=20
spring.task.execution.pool.queue-capacity=500
spring.task.execution.thread-name-prefix=async-

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=500MB
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.location=${java.io.tmpdir}

# File Storage Configuration
file.upload-dir=${FILE_UPLOAD_DIR:./uploads}

# ===== LOGGING OPTIMIZATION =====
logging.file.name=app.log
logging.level.root=WARN
logging.level.com.nearprop=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Email Configuration properties (defaults are overridden by application-secrets)
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:noreply@nearprop.com}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Email Service Configuration
app.email.enabled=${EMAIL_ENABLED:true}

# Configuration imports
spring.config.import=optional:classpath:application-secrets.yml,optional:file:./application-secrets.yml

# Use secrets placeholders for sensitive data
google.maps.api.key=${GOOGLE_MAPS_API_KEY:dummy}
reels.price=${REELS_PRICE:99.00}

# Digital SMS API Configuration
digital-sms.api-url=${DIGITAL_SMS_API_URL:https://sms.digitalsms.net/api/v3/sendsms}
digital-sms.balance-url=${DIGITAL_SMS_BALANCE_URL:https://sms.digitalsms.net/api/v3/me}
digital-sms.low-balance-threshold=${DIGITAL_SMS_LOW_BALANCE_THRESHOLD:500}
digital-sms.notification-emails=${DIGITAL_SMS_NOTIFICATION_EMAILS:rudraashwitechnology@gmail.com,mail.rudraashwitechnology@gmail.com}

# Razorpay Configuration (from secrets)
payment.gateway.razorpay.key=${RAZORPAY_KEY:rzp_test_dummy}
payment.gateway.razorpay.secret=${RAZORPAY_SECRET:dummy_secret}
payment.gateway.razorpay.api.url=${RAZORPAY_API_URL:https://api.razorpay.com/v1}

